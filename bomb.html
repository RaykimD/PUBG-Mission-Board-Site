<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>폭탄빙고 - 배그 미션</title>
    <style>
        :root { --bg: #f8f9fa; --card: #ffffff; --text: #212529; --bomb: #ff4444; }
        [data-theme='dark'] { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --bomb: #ff6b6b; }

        body { background: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .room-tag { background: var(--bomb); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; }

        /* 빙고판 */
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; perspective: 1000px; }
        .card { 
            aspect-ratio: 1/1; background: var(--card); border-radius: 4px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 12px; font-weight: bold; cursor: pointer; 
            border: 1px solid rgba(0,0,0,0.1); transition: 0.2s;
        }
        .card:hover { transform: scale(1.1); border-color: var(--bomb); z-index: 10; }

        /* 폭발 애니메이션 */
        .card.exploded { 
            background: var(--bomb) !important; color: white; border: none;
            animation: blast 0.4s ease-out forwards;
        }
        @keyframes blast {
            0% { transform: scale(1); box-shadow: 0 0 0px orange; }
            50% { transform: scale(1.3); box-shadow: 0 0 30px orange; background: #ffaa00; }
            100% { transform: scale(1); box-shadow: 0 0 5px rgba(0,0,0,0.2); }
        }

        .controls { margin-top: 30px; display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-reset { background: #666; color: white; }
        .btn-copy { background: #27ae60; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" style="text-decoration:none; color:var(--text)">🏠 메인으로</a>
            <div class="room-tag" id="roomDisplay">방 번호 생성 중...</div>
        </div>

        <h2 id="statusText">💣 폭탄을 터뜨려 빙고를 완성하세요!</h2>
        
        <div class="grid" id="grid"></div>

        <div class="controls">
            <button class="btn btn-copy" onclick="copyLink()">🔗 초대 링크 복사</button>
            <button class="btn btn-reset" onclick="resetBoard()">🔄 초기화</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 🚨 여기에 실제 Firebase Config를 넣으세요!
        const firebaseConfig = {
  apiKey: "AIzaSyDoExj9y1DAIZZYLu5g2H3FcexpPkLyfW4",
  authDomain: "pubg-mission-site.firebaseapp.com",
  projectId: "pubg-mission-site",
  storageBucket: "pubg-mission-site.firebasestorage.app",
  messagingSenderId: "26055063441",
  appId: "1:26055063441:web:f942888d592eb210924c30"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. 방 번호 추출 및 자동 생성
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        if (!roomId) {
            roomId = Math.floor(1000 + Math.random() * 9000).toString();
            window.location.search = `?room=${roomId}`;
        }
        document.getElementById('roomDisplay').innerText = "ROOM #" + roomId;

        const roomRef = doc(db, "bomb_rooms", roomId);
        const gridEl = document.getElementById('grid');
        const cards = [];

        // 2. 그리드 생성
        for (let i = 1; i <= 100; i++) {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerText = i;
            div.onclick = () => clickBomb(i);
            gridEl.appendChild(div);
            cards[i] = div;
        }

        // 3. 십자 폭발 로직
        async function clickBomb(num) {
            const updates = {};
            const targets = [num]; // 자기 자신
            
            // 주변 칸 계산 (십자 모양)
            if (num > 10) targets.push(num - 10); // 위
            if (num <= 90) targets.push(num + 10); // 아래
            if (num % 10 !== 1) targets.push(num - 1); // 왼쪽
            if (num % 10 !== 0) targets.push(num + 1); // 오른쪽

            targets.forEach(t => {
                updates[`card_${t}`] = { exploded: true };
            });

            await updateDoc(roomRef, updates);
        }

        // 4. 실시간 동기화
        onSnapshot(roomRef, (doc) => {
            const data = doc.data() || {};
            for (let i = 1; i <= 100; i++) {
                if (data[`card_${i}`]?.exploded) {
                    cards[i].classList.add('exploded');
                    cards[i].innerText = '💥';
                } else {
                    cards[i].classList.remove('exploded');
                    cards[i].innerText = i;
                }
            }
        });

        window.resetBoard = async () => { if(confirm("초기화할까요?")) await setDoc(roomRef, {}); };
        window.copyLink = () => { navigator.clipboard.writeText(window.location.href); alert("링크 복사 완료!"); };
    </script>
</body>
</html>
