<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>폭탄빙고 10x10 - 방송 최적화</title>
    <style>
        :root { 
            --bg: #fdfdfd; --card: #ffffff; --text: #333; 
            --primary: #ff4d4d; --border: #444;
        }
        [data-theme='dark'] { 
            --bg: #1a1a1b; --card: #2d2d2e; --text: #eee; --border: #666;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 15px; font-size: 12px; overflow: hidden; }
        
        /* 메인 레이아웃: 전체 크기를 줄여 한 화면에 들어오도록 설정 */
        .main-layout { display: flex; gap: 20px; align-items: flex-start; max-width: 1000px; margin: 0 auto; }
        
        .fixed-dashboard { position: sticky; top: 15px; width: 220px; display: flex; flex-direction: column; gap: 10px; }
        .viewer-card { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid var(--border); text-align: center; }
        
        .bingo-count { font-size: 48px; font-weight: 900; color: var(--primary); margin: 5px 0; }
        
        .content-area { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        
        .setting-box { background: var(--card); padding: 10px 15px; border-radius: 10px; border: 2px solid var(--border); }
        .setting-flex { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        
        /* 그리드 크기 축소: 방송 화면 송출용 최적화 */
        .bingo-grid { 
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; 
            background: var(--card); padding: 8px; border-radius: 12px; border: 2px solid var(--border);
        }
        .cell { 
            aspect-ratio: 1/1; background: #f8f9fa; border: 1px solid #ccc; border-radius: 3px;
            display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold;
            cursor: pointer; transition: 0.1s; user-select: none;
        }
        [data-theme='dark'] .cell { background: #3d3d3e; border-color: #555; }
        
        .cell.active { background: var(--primary) !important; color: white !important; border-color: rgba(0,0,0,0.2); }

        .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; margin-bottom: 5px; border: 2px solid var(--border); }
        .btn-copy { background: #27ae60; color: white; }
        .btn-lobby { background: #444; color: white; }
        .btn-reset { background: #d32f2f; color: white; }
        
        input[type="color"] { cursor: pointer; border: none; width: 25px; height: 25px; background: none; vertical-align: middle; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="fixed-dashboard">
        <div class="viewer-card">
            <div style="font-weight:bold; color:#888; font-size:11px;">BINGO LINE</div>
            <div class="bingo-count" id="bingoDisplay">0</div>
            <div style="font-weight:bold; color:#666;">현재 빙고</div>
        </div>
        
        <button class="btn btn-copy" onclick="copyRoomLink()">🔗 초대 링크 복사</button>
        <button class="btn btn-lobby" onclick="location.href='index.html'">🏠 로비로 돌아가기</button>
        <button class="btn btn-reset" onclick="resetBingo()">🧹 빙고 초기화</button>
    </div>

    <div class="content-area">
        <div class="setting-box">
            <div class="setting-flex">
                <div>
                    🎨 테마: <input type="color" id="themeColor" value="#ff4d4d" onchange="changeTheme(this.value)">
                </div>
                <div style="font-size:11px; color: var(--primary);">
                    클릭 시 상하좌우가 함께 터집니다.
                </div>
            </div>
        </div>
        <div class="bingo-grid" id="bingoGrid"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDoExj9y1DAIZZYLu5g2H3FcexpPkLyfW4", authDomain: "pubg-mission-site.firebaseapp.com", projectId: "pubg-mission-site", storageBucket: "pubg-mission-site.firebasestorage.app", messagingSenderId: "26055063441", appId: "1:26055063441:web:f942888d592eb210924c30" };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app);
    
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    const roomId = new URLSearchParams(window.location.search).get('room') || "default_bomb";
    const roomRef = doc(db, "bomb_rooms_10", roomId);

    const gridEl = document.getElementById('bingoGrid');
    const cells = [];
    let currentActiveCells = []; // 무한 루프 방지를 위한 로컬 변수

    // 10x10 그리드 생성
    for (let i = 0; i < 100; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.innerText = i + 1;
        cell.onclick = () => handleCellClick(i);
        gridEl.appendChild(cell);
        cells.push(cell);
    }

    // 버그 수정: 클릭 시 로직 개선
    async function handleCellClick(index) {
        const docSnap = await getDoc(roomRef);
        // 방이 없으면 초기화 후 리턴
        if (!docSnap.exists()) {
            await setDoc(roomRef, { activeCells: [], themeColor: "#ff4d4d" });
            return;
        }

        const data = docSnap.data();
        let active = data.activeCells || [];
        
        const row = Math.floor(index / 10);
        const col = index % 10;
        const targets = [index];
        if (row > 0) targets.push(index - 10);
        if (row < 9) targets.push(index + 10);
        if (col > 0) targets.push(index - 1);
        if (col < 9) targets.push(index + 1);

        targets.forEach(t => {
            if (active.includes(t)) active = active.filter(v => v !== t);
            else active.push(t);
        });

        await updateDoc(roomRef, { activeCells: active });
    }

    // 실시간 동기화 (깜빡임 버그 해결)
    onSnapshot(roomRef, (snap) => {
        const data = snap.data();
        if (!data) return;

        if (data.themeColor) {
            document.documentElement.style.setProperty('--primary', data.themeColor);
            document.getElementById('themeColor').value = data.themeColor;
        }

        currentActiveCells = data.activeCells || [];
        cells.forEach((cell, i) => {
            if (currentActiveCells.includes(i)) cell.classList.add('active');
            else cell.classList.remove('active');
        });
        calculateBingo(currentActiveCells);
    });

    function calculateBingo(active) {
        let count = 0;
        const b = Array(100).fill(false);
        active.forEach(idx => b[idx] = true);

        for (let i = 0; i < 10; i++) {
            // 가로
            let rowCheck = true;
            for(let j=0; j<10; j++) if(!b[i*10 + j]) rowCheck = false;
            if(rowCheck) count++;
            // 세로
            let colCheck = true;
            for(let j=0; j<10; j++) if(!b[i + j*10]) colCheck = false;
            if(colCheck) count++;
        }
        // 대각선
        let d1=true, d2=true;
        for(let i=0; i<10; i++) {
            if(!b[i*11]) d1=false;
            if(!b[9 + i*9]) d2=false;
        }
        if(d1) count++; if(d2) count++;
        document.getElementById('bingoDisplay').innerText = count;
    }

    window.changeTheme = async (color) => { await updateDoc(roomRef, { themeColor: color }); };
    window.copyRoomLink = () => { navigator.clipboard.writeText(window.location.href).then(() => alert("초대 링크 복사 완료!")); };
    window.resetBingo = async () => { if (confirm("빙고판을 초기화할까요?")) await setDoc(roomRef, { activeCells: [], themeColor: "#ff4d4d" }); };
</script>
</body>
</html>
