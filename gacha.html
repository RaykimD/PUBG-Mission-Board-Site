<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>가챠배그</title>
    <style>
        :root { 
            --bg: #0f0f10; --card-bg: #2d2d2e; --text: #eee; 
            --border: #444; --accent: #27ae60;
            --normal: #4b5563; --normal-border: #9ca3af;
            --rare: #1d4ed8; --rare-border: #60a5fa;
            --epic: #7e22ce; --epic-border: #c084fc;
            --legend: #b45309; --legend-border: #fbbf24;
            --neon: #39ff14;
        }
        
        body { 
            background: var(--bg); 
            background-image: radial-gradient(#1a1a1b 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: var(--text); font-family: 'Malgun Gothic', sans-serif; 
            margin: 0; padding: 10px; height: 100vh; box-sizing: border-box; 
            overflow: hidden; 
        }
        
        /* 대시보드와 가챠 머신 사이 간격 밀착 */
        .main-layout { display: flex; gap: 15px; align-items: flex-start; height: 100%; max-width: 1200px; margin: 0 auto; justify-content: center; }
        
        .fixed-dashboard { width: 230px; display: flex; flex-direction: column; gap: 6px; height: 100%; flex-shrink: 0; }
        .viewer-card { background: rgba(45, 45, 46, 0.95); padding: 10px; border-radius: 12px; border: 2px solid var(--border); text-align: center; }
        .header-title { font-weight: bold; color: #888; font-size: 10px; letter-spacing: 1px; margin-bottom: 5px; }
        
        .counts { background: rgba(0,0,0,0.5); padding: 8px; border-radius: 8px; border: 1px solid #444; }
        .price-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; font-weight: bold; font-size: 11px; }
        .price-row:last-child { margin-bottom: 0; }
        .price-input { width: 65px; padding: 3px; border-radius: 3px; border: 1px solid #555; background: rgba(0,0,0,0.3); color: white; text-align: right; font-size: 11px; outline: none; }
        .price-input:focus { border-color: var(--neon); }

        .log-container { flex: 1; background: #000; border: 2px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .log-header { background: var(--border); color: white; padding: 5px; font-weight: bold; text-align: center; font-size: 10px; }
        .log-content { flex: 1; overflow-y: auto; padding: 8px; font-family: 'Consolas', monospace; font-size: 11px; }
        .log-entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .content-area { flex: 1; height: 100%; display: flex; align-items: center; justify-content: flex-start; }
        
        .arcade-machine {
            background: #1a1a1a; padding: 12px; border: 5px solid #333;
            border-top: 30px solid #222; 
            border-bottom: 10px solid #222; /* 하단 버튼 영역 제거하고 얇게 조정 */
            border-radius: 18px; box-shadow: 0 0 30px rgba(0,0,0,0.8);
            position: relative; height: 92vh; aspect-ratio: 1/1.1;
            display: flex; flex-direction: column; align-items: center; box-sizing: border-box;
        }

        .arcade-machine::before {
            content: "GACHA SHOP";
            position: absolute; top: -24px; left: 50%; transform: translateX(-50%);
            color: var(--neon); font-size: 14px; font-weight: 900;
            text-shadow: 0 0 8px var(--neon); letter-spacing: 2px;
        }

        /* 하단 A, B 버튼 장식 가상 요소(::after) 제거 */

        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; width: 100%; height: 100%; background: #000; padding: 6px; border-radius: 6px; box-sizing: border-box; }
        .card-container { aspect-ratio: 1/1; cursor: pointer; transform-style: preserve-3d; transition: transform 0.6s; position: relative; }
        .card-container.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 1.5px solid var(--border); font-size: 14px; box-sizing: border-box; }
        .card-front { background: #232d38; color: #555; }
        .card-back { transform: rotateY(180deg); color: white; font-size: 22px; }
        
        .rank-normal { background: var(--normal); border-color: var(--normal-border); }
        .rank-rare { background: var(--rare); border-color: var(--rare-border); }
        .rank-epic { background: var(--epic); border-color: var(--epic-border); }
        .rank-legend { background: var(--legend); border-color: var(--legend-border); }

        #effectOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; align-items: center; justify-content: center; z-index: 1000; font-size: 5rem; font-weight: 900; opacity: 0; transition: 0.5s; }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% {transform: translate(0,0);} 20% {transform: translate(-5px,5px);} 40% {transform: translate(5px,-5px);} }

        .btn { width: 100%; padding: 9px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 11px; border: 2px solid var(--border); transition: 0.2s; }
        .btn-copy { background: #27ae60; color: white; }
        .btn-lobby { background: #444; color: white; }
        .btn-reset { background: #d32f2f; color: white; margin-top: auto; }
    </style>
</head>
<body>
    <div id="effectOverlay"></div>
    <div class="main-layout">
        <div class="fixed-dashboard">
            <div class="viewer-card">
                <div class="header-title">GACHA STATUS</div>
                <div class="counts" id="priceDisplay">
                    <div class="price-row"><span>💀 일반 (<span id="cnt-normal">0</span>/60)</span><input type="text" id="price-normal" class="price-input" onchange="updatePrices()"></div>
                    <div class="price-row"><span>⭐ 레어 (<span id="cnt-rare">0</span>/30)</span><input type="text" id="price-rare" class="price-input" onchange="updatePrices()"></div>
                    <div class="price-row"><span>🔥 에픽 (<span id="cnt-epic">0</span>/8)</span><input type="text" id="price-epic" class="price-input" onchange="updatePrices()"></div>
                    <div class="price-row"><span>💎 전설 (<span id="cnt-legend">0</span>/2)</span><input type="text" id="price-legend" class="price-input" onchange="updatePrices()"></div>
                </div>
            </div>
            <button class="btn btn-copy" onclick="copyRoomLink()">🔗 초대 링크 복사</button>
            <button class="btn btn-lobby" onclick="location.href='index.html'">🏠 로비로 돌아가기</button>
            <div class="log-container">
                <div class="log-header">GACHA LOGS</div>
                <div class="log-content" id="logBox"></div>
            </div>
            <button class="btn btn-reset" onclick="resetGame()">🧹 가챠 초기화</button>
        </div>
        <div class="content-area">
            <div class="arcade-machine"><div class="grid" id="grid"></div></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDoExj9y1DAIZZYLu5g2H3FcexpPkLyfW4", authDomain: "pubg-mission-site.firebaseapp.com", projectId: "pubg-mission-site", storageBucket: "pubg-mission-site.firebasestorage.app", messagingSenderId: "26055063441", appId: "1:26055063441:web:f942888d592eb210924c30" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        const roomId = new URLSearchParams(window.location.search).get('room') || "default_gacha";
        const roomRef = doc(db, "gacha_rooms", roomId);
        const gridEl = document.getElementById('grid'); const cards = []; let isRevealing = false;

        for (let i = 1; i <= 100; i++) {
            const con = document.createElement('div'); con.className = 'card-container';
            con.innerHTML = `<div class="card-face card-front">${i}</div><div class="card-face card-back">?</div>`;
            con.onclick = () => flip(i); gridEl.appendChild(con); cards[i] = con;
        }

        async function initPool() {
            let pool = [];
            for(let i=0; i<60; i++) pool.push({ rank: 'normal', icon: '💀', name: '일반' });
            for(let i=0; i<30; i++) pool.push({ rank: 'rare', icon: '⭐', name: '레어' });
            for(let i=0; i<8; i++) pool.push({ rank: 'epic', icon: '🔥', name: '에픽' });
            for(let i=0; i<2; i++) pool.push({ rank: 'legend', icon: '💎', name: '전설' });
            pool.sort(() => Math.random() - 0.5);
            await setDoc(roomRef, { cardPool: pool, logs: [], isResetting: false, prices: {normal: '', rare: '', epic: '', legend: ''} }, { merge: false });
        }

        async function flip(n) {
            if (isRevealing) return;
            const docSnap = await getDoc(roomRef);
            if (!docSnap.exists()) { await initPool(); return; }
            const data = docSnap.data();
            if (data[`card_${n}`]) return;
            const cardInfo = data.cardPool[n-1];
            const timeStr = new Date().toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' });
            await updateDoc(roomRef, { [`card_${n}`]: cardInfo, logs: arrayUnion(`[${timeStr}] ${n}번: ${cardInfo.icon} ${cardInfo.name}`) });
        }

        window.updatePrices = async () => {
            const prices = { normal: document.getElementById('price-normal').value, rare: document.getElementById('price-rare').value, epic: document.getElementById('price-epic').value, legend: document.getElementById('price-legend').value };
            await updateDoc(roomRef, { prices });
        };

        onSnapshot(roomRef, (snap) => {
            const data = snap.data(); if (!data || !data.cardPool) { initPool(); return; }
            if (data.isResetting) { isRevealing = true; revealAll(data); return; } else { isRevealing = false; }

            const current = { normal: 0, rare: 0, epic: 0, legend: 0 };
            document.getElementById('logBox').innerHTML = (data.logs || []).slice().reverse().slice(0, 30).map(l => {
                let color = l.includes('전설') ? 'var(--legend-border)' : (l.includes('에픽') ? 'var(--epic-border)' : 'inherit');
                return `<div class="log-entry" style="color:${color}">${l}</div>`;
            }).join('');

            for (let i = 1; i <= 100; i++) {
                const c = data[`card_${i}`];
                if (c) {
                    if (!cards[i].classList.contains('is-flipped')) { triggerEffect(c.rank); }
                    cards[i].classList.add('is-flipped');
                    const back = cards[i].querySelector('.card-back');
                    back.className = `card-face card-back rank-${c.rank}`; back.innerText = c.icon;
                    current[c.rank]++;
                } else { cards[i].classList.remove('is-flipped'); }
            }
            
            for (const rank in current) {
                document.getElementById(`cnt-${rank}`).innerText = current[rank];
                const input = document.getElementById(`price-${rank}`);
                if (data.prices && document.activeElement !== input) input.value = data.prices[rank] || '';
            }
        });

        function revealAll(data) {
            for (let i = 1; i <= 100; i++) {
                const c = data.cardPool[i-1];
                cards[i].classList.add('is-flipped');
                const back = cards[i].querySelector('.card-back');
                back.className = `card-face card-back rank-${c.rank}`; back.innerText = c.icon;
            }
        }

        function triggerEffect(rank) {
            const overlay = document.getElementById('effectOverlay');
            if (rank === 'legend' || rank === 'epic') {
                overlay.innerText = rank === 'legend' ? "LEGENDARY!!" : "EPIC!";
                overlay.style.color = rank === 'legend' ? "var(--legend-border)" : "var(--epic-border)";
                overlay.style.opacity = "1"; document.body.classList.add('shake');
                setTimeout(() => { overlay.style.opacity = "0"; document.body.classList.remove('shake'); }, 1500);
            }
        }

        window.copyRoomLink = () => { navigator.clipboard.writeText(window.location.href).then(() => alert("링크 복사 완료!")); };
        window.resetGame = async () => { if(confirm("3초간 공개 후 초기화?")) { await updateDoc(roomRef, { isResetting: true }); setTimeout(initPool, 3000); } };
    </script>
</body>
</html>오후 4:55 2026-04-16
