<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배그 미션 시트지 사이트</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        @font-face {
            font-family: 'GmarketSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
            font-weight: 700;
        }

        :root { --bg: #f8f9fa; --card-bg: #ffffff; --text: #212529; --primary: #4d94ff; --border: #e0e0e0; }
        [data-theme='dark'] { --bg: #121212; --card-bg: #1e1e1e; --text: #e0e0e0; --primary: #3498db; --border: #333; }

        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; margin: 0; transition: background 0.3s, color 0.3s; }
        .container { max-width: 900px; margin: 0 auto; padding: 50px 20px; text-align: center; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
        .theme-toggle { cursor: pointer; padding: 10px 20px; border-radius: 20px; border: 2px solid var(--text); background: transparent; color: var(--text); font-weight: 900; transition: 0.2s; }
        .theme-toggle:hover { opacity: 0.7; }

        h1 { font-family: 'GmarketSans', sans-serif; font-size: 2.8rem; margin-bottom: 10px; letter-spacing: -1px; }
        p.subtitle { font-size: 1.1rem; color: #888; margin-bottom: 40px; font-weight: 700; }

        .mission-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
        }

        .mission-card {
            background: var(--card-bg); border: 2px solid var(--border); border-radius: 16px; 
            padding: 30px 20px; text-decoration: none; color: var(--text); 
            display: flex; flex-direction: column; align-items: center; 
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }
        .mission-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-color: var(--primary); }
        [data-theme='dark'] .mission-card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .icon { font-size: 3rem; margin-bottom: 15px; }
        .m-title { font-family: 'GmarketSans', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }
        .m-desc { font-size: 0.95rem; opacity: 0.8; font-weight: 700; }

        .locked { opacity: 0.5; cursor: not-allowed; border-style: dashed; }
        .locked:hover { transform: none; box-shadow: none; border-color: var(--border); }

        footer { margin-top: 60px; font-size: 0.9rem; color: #888; font-weight: 700; }

        /* 모바일 등 작은 화면에서는 1줄로 배치 */
        @media (max-width: 600px) {
            .mission-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div style="width: 80px;"></div> <h1 style="margin:0;">PUBG MISSION</h1>
            <button class="theme-toggle" onclick="toggleTheme()">🌙 DARK</button>
        </header>

        <p class="subtitle">스트리머를 위한 실시간 시트지 플랫폼</p>

        <div class="mission-grid">
            <a href="#" onclick="confirmCreateRoom('bingo.html', '커스텀 빙고판')" class="mission-card">
                <span class="icon">🔢</span>
                <span class="m-title">빙고판</span>
                <span class="m-desc">다양하게 만들 수 있는 빙고판!</span>
            </a>

            <a href="#" onclick="confirmCreateRoom('bomb.html', '폭탄빙고 10x10')" class="mission-card">
                <span class="icon">💣</span>
                <span class="m-title">폭탄빙고 10x10</span>
                <span class="m-desc">상하좌우 연쇄폭발!</span>
            </a>

            <a href="#" onclick="confirmCreateRoom('kill.html', '벽킬내기')" class="mission-card">
                <span class="icon">🔫</span>
                <span class="m-title">벽킬내기</span>
                <span class="m-desc">과연 벽을 깰 수 있을까?</span>
            </a>

            <a href="#" onclick="confirmCreateRoom('kill_damage.html', '벽킬딜내기')" class="mission-card">
                <span class="icon">💥</span>
                <span class="m-title">벽킬딜내기</span>
                <span class="m-desc">킬과 딜을 합산!</span>
            </a>

            <a href="#" onclick="confirmCreateRoom('land.html', '땅따먹기')" class="mission-card">
                <span class="icon">🗺️</span>
                <span class="m-title">땅따먹기</span>
                <span class="m-desc">최대 4개 팀의 치열한 점령전</span>
            </a>

            <a href="#" onclick="confirmCreateRoom('gacha.html', 'GACHA SHOP')" class="mission-card">
                <span class="icon">🎁</span>
                <span class="m-title">GACHA SHOP</span>
                <span class="m-desc">배그로 가챠를 할 수 있다고?!</span>
            </a>
        </div>

        <footer>Made by. 김쨔응 | PUBG Mission Platform 2026</footer>
    </div>

    <script>
        // 🔥 중복 확률 0%에 수렴하는 10자리 난수(UUID) 기반 방 생성 기능
        function confirmCreateRoom(page, title) {
            if(confirm(`[${title}] 새로운 방을 생성하여 입장하시겠습니까?\n생성 후 우측 상단의 링크 복사 버튼을 통해 팀원을 초대하세요.`)) {
                // '-'를 제거하고 정확히 10글자 대문자로 추출 (예: A7F9B2C4E1)
                const roomId = crypto.randomUUID().replace(/-/g, '').substring(0, 10).toUpperCase();
                location.href = `./${page}?room=${roomId}`;
            }
        }

        // 테마 및 초기화 로직 유지
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const btn = document.querySelector('.theme-toggle');
            if(theme === 'dark') {
                btn.innerText = '☀️ LIGHT';
                btn.style.borderColor = '#e0e0e0';
                btn.style.color = '#e0e0e0';
            } else {
                btn.innerText = '🌙 DARK';
                btn.style.borderColor = '#212529';
                btn.style.color = '#212529';
            }
        }

        function toggleTheme() {
            const current = localStorage.getItem('theme') || 'light';
            applyTheme(current === 'light' ? 'dark' : 'light');
        }

        // 페이지 로드 시 기존 설정된 테마 불러오기
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            applyTheme(savedTheme);
        };
    </script>
</body>
</html>
