<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>벽킬딜내기</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        @font-face {
            font-family: 'GmarketSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
        }

        :root { 
            --bg: #fdfdfd; --card: #ffffff; --text: #333; 
            --p1: #ffadad; --p2: #ffd6a5; --p3: #caffbf; --p4: #9bf6ff;
            --accent: #4d94ff;
            --border: #444;
        }
        [data-theme='dark'] { 
            --bg: #1a1a1b; --card: #2d2d2e; --text: #eee; 
            --p1: #8c4444; --p2: #8c6a44; --p3: #448c5a; --p4: #447a8c;
            --border: #666;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 15px; font-size: 15px; transition: background 0.3s; }
        
        .main-layout { display: flex; gap: 20px; align-items: flex-start; }
        
        .fixed-dashboard { position: sticky; top: 15px; width: 310px; display: flex; flex-direction: column; gap: 12px; z-index: 100; }
        .viewer-card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid var(--border); }
        
        .header-title { font-weight: 900; color: #888; font-size: 13px; letter-spacing: 1px; margin-bottom: 5px; }
        
        .main-score { font-size: 36px; font-weight: 900; color: var(--accent); margin: 5px 0 10px 0; letter-spacing: -1px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        
        .player-stat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; font-weight: 900; font-size: 15px; border: 1px solid #bbb; color: #333; }
        [data-theme='dark'] .player-stat-row { color: #eee; border-color: #555; }
        
        /* 🔥 플레이어 이름 깔끔하고 눈에 띄는 폰트 적용 🔥 */
        .p-name { font-family: 'GmarketSans', sans-serif; font-size: 19px; letter-spacing: 0.5px; text-shadow: 1px 1px 0px rgba(255,255,255,0.4); }
        [data-theme='dark'] .p-name { text-shadow: 1px 1px 0px rgba(0,0,0,0.5); }
        
        .p-score-detail { font-size: 15px; opacity: 0.9; }

        .bar-bg { height: 28px; background: #eee; border-radius: 14px; overflow: hidden; display: flex; position: relative; margin: 15px 0; border: 1px solid #999; }
        .bar-segment { height: 100%; transition: width 0.5s ease; }
        .bar-label { position: absolute; width: 100%; text-align: center; line-height: 28px; font-weight: 900; color: #000; z-index: 10; font-size: 15px; text-shadow: 0px 0px 4px rgba(255,255,255,0.8); }

        .content-area { flex: 1; min-width: 0; }
        table { width: 100%; border-collapse: collapse; background: var(--card); table-layout: fixed; margin-bottom: 10px; border: 2px solid var(--border); }
        th, td { border: 1px solid var(--border); padding: 10px 6px; text-align: center; }
        th { background: rgba(128,128,128,0.1); font-size: 14px; color: var(--text); font-weight: 900; }

        input[type="number"], input[type="text"] { width: 90%; border: 1px solid #aaa; border-radius: 4px; padding: 6px 0; text-align: center; background: transparent; color: inherit; font-weight: 900; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; }
        input:focus { outline: none; background: rgba(255,255,255,0.2); border-color: var(--accent); }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield; 
        }

        .bg-p1 { background-color: var(--p1) !important; color: #111 !important; } .bg-p2 { background-color: var(--p2) !important; color: #111 !important; }
        .bg-p3 { background-color: var(--p3) !important; color: #111 !important; } .bg-p4 { background-color: var(--p4) !important; color: #111 !important; }
        
        .map-cell { font-weight: 900; transition: background 0.3s; font-size: 14px; }
        .map-erangel { background-color: #e8f5e9 !important; color: #2e7d32 !important; }
        .map-miramar { background-color: #fff3e0 !important; color: #d84315 !important; }
        .map-sanhok { background-color: #e0f2f1 !important; color: #00695c !important; }
        .map-taego { background-color: #e3f2fd !important; color: #1565c0 !important; }
        .map-vikendi { background-color: #eceff1 !important; color: #455a64 !important; }
        .map-rondo { background-color: #f3e5f5 !important; color: #6a1b9a !important; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 15px; margin-bottom: 6px; transition: 0.2s; border: 2px solid var(--border); font-family: 'Noto Sans KR', sans-serif; }
        .btn-copy { background: #27ae60; color: white; }
        .btn-lobby { background: #444; color: white; }
        .btn-reset { background: #d32f2f; color: white; }
        .btn-add { background: var(--card); border: 2px dashed #999; color: var(--text); margin-top: 10px; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="fixed-dashboard">
        <div class="viewer-card">
            <div class="header-title">MISSION PROGRESS</div>
            <div class="main-score"><span id="v-total">0</span> / <span id="v-target">10,000</span></div>
            
            <div class="bar-bg">
                <div id="bar-1" class="bar-segment bg-p1" style="width:0%"></div>
                <div id="bar-2" class="bar-segment bg-p2" style="width:0%"></div>
                <div id="bar-3" class="bar-segment bg-p3" style="width:0%"></div>
                <div id="bar-4" class="bar-segment bg-p4" style="width:0%"></div>
                <div class="bar-label" id="v-percent">0%</div>
            </div>

            <div id="player-summaries">
                <div class="player-stat-row bg-p1"> <span class="p-name n-1">P1</span> <span id="s-1" class="p-score-detail">0 (0-0)</span> </div>
                <div class="player-stat-row bg-p2"> <span class="p-name n-2">P2</span> <span id="s-2" class="p-score-detail">0 (0-0)</span> </div>
                <div class="player-stat-row bg-p3"> <span class="p-name n-3">P3</span> <span id="s-3" class="p-score-detail">0 (0-0)</span> </div>
                <div class="player-stat-row bg-p4"> <span class="p-name n-4">P4</span> <span id="s-4" class="p-score-detail">0 (0-0)</span> </div>
            </div>
            
            <div style="margin-top:15px; font-weight:900; font-size:15px; display:flex; justify-content:space-between; border-top:2px solid var(--border); padding-top:12px;">
                <span>🍗 치킨: <span id="v-wins" style="color:#2e7d32;">0</span>회</span>
                <span style="color:#d32f2f;">남은: <span id="v-remain">10,000</span></span>
            </div>
        </div>
        
        <button class="btn btn-copy" onclick="copyRoomLink()">🔗 초대 링크 복사</button>
        <button class="btn btn-lobby" onclick="location.href='index.html'">🏠 로비로 돌아가기</button>
        <button class="btn btn-reset" onclick="resetSheet()">🧹 시트지 초기화</button>
    </div>

    <div class="content-area">
        <div class="setting-table">
            <table>
                <tr>
                    <th width="80">설정</th>
                    <th class="bg-p1">
                        <input type="text" id="name-1" value="P1" onchange="updateAll()">
                        <button onclick="document.getElementById('cp-1').click()" style="border:none; background:none; cursor:pointer;">🎨</button>
                        <input type="color" id="cp-1" style="display:none" onchange="changeColor(1, this.value)">
                    </th>
                    <th class="bg-p2">
                        <input type="text" id="name-2" value="P2" onchange="updateAll()">
                        <button onclick="document.getElementById('cp-2').click()" style="border:none; background:none; cursor:pointer;">🎨</button>
                        <input type="color" id="cp-2" style="display:none" onchange="changeColor(2, this.value)">
                    </th>
                    <th class="bg-p3">
                        <input type="text" id="name-3" value="P3" onchange="updateAll()">
                        <button onclick="document.getElementById('cp-3').click()" style="border:none; background:none; cursor:pointer;">🎨</button>
                        <input type="color" id="cp-3" style="display:none" onchange="changeColor(3, this.value)">
                    </th>
                    <th class="bg-p4">
                        <input type="text" id="name-4" value="P4" onchange="updateAll()">
                        <button onclick="document.getElementById('cp-4').click()" style="border:none; background:none; cursor:pointer;">🎨</button>
                        <input type="color" id="cp-4" style="display:none" onchange="changeColor(4, this.value)">
                    </th>
                    <th width="200">목표 점수 & 치킨 점수</th>
                </tr>
                <tr>
                    <td>데스</td>
                    <td><input type="number" id="die-1" style="width:60px;" value="300" onchange="updateAll()"></td>
                    <td><input type="number" id="die-2" style="width:60px;" value="200" onchange="updateAll()"></td>
                    <td><input type="number" id="die-3" style="width:60px;" value="100" onchange="updateAll()"></td>
                    <td><input type="number" id="die-4" style="width:60px;" value="0" onchange="updateAll()"></td>
                    <td style="text-align:left; padding-left:10px; line-height: 1.8;">
                        목표: <input type="number" id="targetInput" style="width:80px;" value="10000" onchange="updateAll()"><br>
                        배틀: <input type="number" id="winBig" style="width:60px;" value="800" onchange="updateAll()"> 
                        미니: <input type="number" id="winSmall" style="width:60px;" value="500" onchange="updateAll()">
                    </td>
                </tr>
            </table>
        </div>

        <table id="mainSheet">
            <thead>
                <tr>
                    <th width="40">R</th>
                    <th width="100">맵</th>
                    <th colspan="3" class="bg-p1 n-1">P1</th>
                    <th colspan="3" class="bg-p2 n-2">P2</th>
                    <th colspan="3" class="bg-p3 n-3">P3</th>
                    <th colspan="3" class="bg-p4 n-4">P4</th>
                    <th width="40">🍗</th>
                    <th width="60">합계</th>
                </tr>
            </thead>
            <tbody id="sheetBody"></tbody>
        </table>
        <button class="btn btn-add" onclick="addNewRow()">+ 다음 라운드 추가 (+ Add Round)</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDoExj9y1DAIZZYLu5g2H3FcexpPkLyfW4", authDomain: "pubg-mission-site.firebaseapp.com", projectId: "pubg-mission-site", storageBucket: "pubg-mission-site.firebasestorage.app", messagingSenderId: "26055063441", appId: "1:26055063441:web:f942888d592eb210924c30" };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app);
    
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    const roomId = new URLSearchParams(window.location.search).get('room') || "default";
    const roomRef = doc(db, "kill_sheets", roomId);

    let rowCount = 0;
    const maps = [{name:"에란겔",class:"map-erangel"},{name:"미라마",class:"map-miramar"},{name:"태이고",class:"map-taego"},{name:"비켄디",class:"map-vikendi"},{name:"론도",class:"map-rondo"},{name:"데스턴",class:"map-taego"},{name:"사녹",class:"map-sanhok"},{name:"파라모",class:"map-sanhok"},{name:"카라킨",class:"map-miramar"}];

    function createRow(r) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td style="font-weight: 900; font-size: 14px;">${r}</td>
            <td class="map-cell"><select id="map-${r}" onchange="updateMapStyle(${r}); updateAll();" style="width:100%; border:none; background:transparent; color:inherit; font-weight:900; cursor:pointer; font-size: 14px; font-family: 'Noto Sans KR';">
                <option value="">선택</option>${maps.map(m=>`<option value="${m.name}">${m.name}</option>`).join('')}
            </select></td>
            ${[1,2,3,4].map(p => `
                <td><input type="number" id="k-${r}-${p}" onchange="updateAll()" style="border:none; width:36px; font-size:15px; font-weight:900; font-family: 'Noto Sans KR';"></td>
                <td><input type="number" id="dmg-${r}-${p}" onchange="updateAll()" style="border:none; width:55px; font-size:15px; font-weight:900; font-family: 'Noto Sans KR';"></td>
                <td><input type="checkbox" id="d-${r}-${p}" onchange="updateAll()" style="transform: scale(1.3);"></td>
            `).join('')}
            <td><input type="checkbox" id="w-${r}" onchange="updateAll()" style="transform: scale(1.3);"></td>
            <td id="total-${r}" style="font-weight:900; font-size: 15px; background:rgba(0,0,0,0.02);">0</td>
        `;
        document.getElementById('sheetBody').appendChild(tr); rowCount = r;
    }

    window.updateMapStyle = (r) => {
        const sel = document.getElementById(`map-${r}`);
        sel.parentElement.className = "map-cell " + (maps.find(m => m.name === sel.value)?.class || "");
    };

    for(let i=1; i<=30; i++) createRow(i);
    window.addNewRow = () => createRow(rowCount + 1);

    window.updateAll = async () => {
        const settings = {
            names: [1,2,3,4].map(i => document.getElementById('name-'+i).value),
            colors: [1,2,3,4].map(i => getComputedStyle(document.documentElement).getPropertyValue(`--p${i}`).trim()),
            dies: [1,2,3,4].map(i => Number(document.getElementById('die-'+i).value)),
            target: Number(document.getElementById('targetInput').value),
            winBig: Number(document.getElementById('winBig').value),
            winSmall: Number(document.getElementById('winSmall').value)
        };
        
        let grandTotal = 0, winCount = 0, pK = [0,0,0,0], pDmg = [0,0,0,0], pD = [0,0,0,0], pS = [0,0,0,0], rounds = {};
        
        for(let r=1; r<=rowCount; r++) {
            const map = document.getElementById(`map-${r}`).value; if(!map) continue;
            let rowS = 0; const pStats = [];
            for(let p=1; p<=4; p++) {
                const k = Number(document.getElementById(`k-${r}-${p}`).value || 0);
                const dmg = Number(document.getElementById(`dmg-${r}-${p}`).value || 0);
                const d = document.getElementById(`d-${r}-${p}`).checked;
                
                const score = (k * 100) + dmg - (d ? settings.dies[p-1] : 0);
                
                rowS += score; pS[p-1] += score; pK[p-1] += k; pDmg[p-1] += dmg; if(d) pD[p-1]++;
                pStats.push({k, dmg, d}); 
            }
            if(document.getElementById(`w-${r}`).checked) { winCount++; rowS += ["사녹","파라모","카라킨"].includes(map) ? settings.winSmall : settings.winBig; }
            document.getElementById(`total-${r}`).innerText = rowS.toLocaleString(); grandTotal += rowS;
            rounds[`r${r}`] = { map, isWin: document.getElementById(`w-${r}`).checked, pStats, rowS };
        }
        await setDoc(roomRef, { settings, rounds, grandTotal, winCount, pK, pDmg, pD, pS, rowCount }, { merge: true });
    };

    onSnapshot(roomRef, (snap) => {
        const data = snap.data(); if(!data) return;
        if(data.rowCount > rowCount) { for(let i=rowCount+1; i<=data.rowCount; i++) createRow(i); }
        if(data.settings) {
            data.settings.colors.forEach((c, i) => document.documentElement.style.setProperty(`--p${i+1}`, c));
            data.settings.names.forEach((n, i) => {
                const input = document.getElementById(`name-${i+1}`);
                if (document.activeElement !== input) input.value = n;
                document.querySelectorAll(`.n-${i+1}`).forEach(el => el.innerText = n);
            });
            
            if (data.settings.dies) {
                data.settings.dies.forEach((dValue, i) => {
                    const dieInput = document.getElementById(`die-${i+1}`);
                    if (document.activeElement !== dieInput) dieInput.value = dValue;
                });
            }

            document.getElementById('targetInput').value = data.settings.target;
            document.getElementById('winBig').value = data.settings.winBig;
            document.getElementById('winSmall').value = data.settings.winSmall;
            document.getElementById('v-target').innerText = data.settings.target.toLocaleString();
        }
        if(data.rounds) {
            for(let r=1; r<=rowCount; r++) {
                const rd = data.rounds[`r${r}`]; if(!rd) continue;
                document.getElementById(`map-${r}`).value = rd.map; updateMapStyle(r);
                document.getElementById(`w-${r}`).checked = rd.isWin;
                rd.pStats.forEach((p, pi) => {
                    const kIn = document.getElementById(`k-${r}-${pi+1}`);
                    if (document.activeElement !== kIn) kIn.value = p.k || "";
                    
                    const dmgIn = document.getElementById(`dmg-${r}-${pi+1}`);
                    if (document.activeElement !== dmgIn) dmgIn.value = p.dmg || "";
                    
                    document.getElementById(`d-${r}-${pi+1}`).checked = p.d;
                });
                document.getElementById(`total-${r}`).innerText = (rd.rowS || 0).toLocaleString();
            }
        }
        
        document.getElementById('v-total').innerText = (data.grandTotal || 0).toLocaleString();
        let target = data.settings?.target || 10000;
        let percentValue = Math.min(100, ((data.grandTotal || 0) / target) * 100);
        document.getElementById('v-percent').innerText = (percentValue % 1 === 0 ? percentValue : percentValue.toFixed(1)) + "%";
        
        document.getElementById('v-wins').innerText = data.winCount || 0;
        document.getElementById('v-remain').innerText = Math.max(0, target - (data.grandTotal || 0)).toLocaleString();

        if(data.pS) data.pS.forEach((v, i) => {
            document.getElementById(`bar-${i+1}`).style.width = (data.grandTotal > 0 ? Math.max(0, (v / target) * 100) : 0) + "%";
            
            let grossScore = (data.pK[i] * 100) + (data.pDmg?.[i] || 0); 
            let totalPenalty = data.pD[i] * (data.settings.dies[i] || 0); 
            
            document.getElementById(`s-${i+1}`).innerText = `${v.toLocaleString()} (${grossScore.toLocaleString()}-${totalPenalty.toLocaleString()})`;
        });
    });

    window.changeColor = async (pIdx, color) => {
        document.documentElement.style.setProperty(`--p${pIdx}`, color); await updateAll();
    };
    window.copyRoomLink = () => {
        navigator.clipboard.writeText(window.location.href).then(() => alert("초대 링크 복사 완료!"));
    };
    window.resetSheet = async () => { if(confirm("시트를 초기화하시겠습니까?")) { await setDoc(roomRef, {}); location.reload(); } };
</script>
</body>
</html>
