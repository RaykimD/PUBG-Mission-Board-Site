<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>빙고판</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        @font-face {
            font-family: 'GmarketSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
            font-weight: 700;
        }

        :root {
            --bg: #fdfdfd; --card: #ffffff; --text: #333; --border: #444;
            --before-color: #eeeeee; --after-color: #4d94ff;
        }
        [data-theme='dark'] {
            --bg: #1a1a1b; --card: #2d2d2e; --text: #eee; --border: #666;
            --before-color: #3d3d3e; --after-color: #3498db;
            color-scheme: dark;
        }

        /* 방송 송출 화면 최적화: 뷰포트 고정 및 정중앙 배치 */
        body { 
            background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; 
            box-sizing: border-box; overflow: hidden; transition: 0.3s; 
        }
        
        .main-container { 
            width: 100%; height: 100%; display: flex; flex-direction: column; 
            padding: 15px; box-sizing: border-box;
        }

        /* 설정 영역 */
        .control-panel { 
            background: var(--card); padding: 10px 20px; border-radius: 12px; border: 2px solid var(--border); 
            display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: center; font-size: 13px;
            margin-bottom: 10px; flex-shrink: 0;
        }
        .control-group { display: flex; align-items: center; gap: 6px; font-weight: bold; }
        input[type="number"], input[type="text"], select { 
            border: 1px solid #aaa; border-radius: 4px; padding: 5px; text-align: center; 
            font-weight: 900; background: transparent; color: inherit; font-size: 13px;
        }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        /* 정보 영역 */
        .info-panel { text-align: center; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; margin-bottom: 10px; }
        #mission-title { 
            font-family: 'GmarketSans', sans-serif; font-size: 24px; width: 80%; border: none; 
            border-bottom: 2px dashed var(--border); padding: 5px; text-align: center; outline: none; margin: 0 auto;
        }
        .status-bar { 
            font-family: 'GmarketSans', sans-serif; font-size: 18px; display: flex; justify-content: center; 
            gap: 30px; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 8px; width: fit-content; margin: 0 auto;
        }

        /* 🔥 핵심 수정: 상하좌우 완벽한 정중앙 배치를 위한 래퍼 */
        .bingo-wrapper { 
            flex: 1; display: flex; justify-content: center; align-items: center; 
            min-height: 0; width: 100%; padding: 10px; box-sizing: border-box;
        }
        
        #bingo-grid { 
            display: grid; gap: 10px; 
            width: 100%; height: 100%;
            /* 비율 유지를 위해 JS에서 dynamic하게 width/height 조절 */
            max-width: 100%; max-height: 100%;
            margin: auto; 
        }
        
        .bingo-cell { 
            background: var(--before-color); border: 2px solid var(--border); border-radius: 10px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            font-family: 'GmarketSans', sans-serif; transition: 0.2s;
            position: relative; user-select: none; box-sizing: border-box; overflow: hidden;
        }
        .bingo-cell.checked { background: var(--after-color) !important; color: white; transform: scale(0.96); box-shadow: inset 0 0 20px rgba(0,0,0,0.2); }
        
        .bingo-cell span, .bingo-cell input {
            display: block; width: 100%; text-align: center;
            color: inherit; font-family: inherit; font-size: inherit; font-weight: inherit;
            border: none; background: transparent; outline: none;
        }

        .btn { padding: 8px 16px; border-radius: 8px; border: 2px solid var(--border); font-weight: 900; cursor: pointer; transition: 0.2s; font-family: 'Noto Sans KR'; font-size: 13px; }
        .btn-main { background: var(--after-color); color: white; border: none; }
        .btn-sub { background: #555; color: white; border: none; }
        .btn-reset { background: #d32f2f; color: white; border: none; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        .palette-group { display: flex; gap: 8px; align-items: center; padding-left: 15px; border-left: 2px solid #ddd; }
        .color-box { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; overflow: hidden; }
        input[type="color"] { border: none; width: 100%; height: 100%; cursor: pointer; transform: scale(2); }
        
        .footer-utils { display: flex; justify-content: center; gap: 10px; padding: 10px 0; flex-shrink: 0; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="control-panel">
        <div class="control-group">
            크기: <input type="number" id="rows" value="5" min="1" max="10" style="width:35px"> x <input type="number" id="cols" value="5" min="1" max="10" style="width:35px">
        </div>
        <div class="control-group">
            모드: 
            <select id="mode" onchange="toggleModeUI()">
                <option value="num">숫자</option>
                <option value="alpha">알파벳</option>
                <option value="manual">직접입력</option>
            </select>
        </div>
        <div id="num-range" class="control-group">
            범위: <input type="number" id="min" value="1" style="width:40px"> ~ <input type="number" id="max" value="50" style="width:40px">
        </div>
        <div class="palette-group">
            <span style="font-size:11px">전</span><div class="color-box"><input type="color" id="color-before" value="#eeeeee" onchange="updateColors()"></div>
            <span style="font-size:11px">후</span><div class="color-box"><input type="color" id="color-after" value="#4d94ff" onchange="updateColors()"></div>
        </div>
        <div style="display:flex; gap:6px;">
            <button class="btn btn-main" onclick="generateBingo(true, 'random')">랜덤생성</button>
            <button class="btn btn-sub" id="seq-btn" onclick="generateBingo(true, 'seq')">정방향</button>
            <button class="btn" onclick="generateBingo(false, 'reroll')">리롤</button>
            <button class="btn btn-reset" onclick="resetAll()">초기화</button>
        </div>
    </div>

    <div class="info-panel">
        <input type="text" id="mission-title" placeholder="미션 제목을 입력하세요" onchange="saveSync()">
        <div class="status-bar">
            <span>체크: <span id="count-checked" style="color:var(--after-color)">0</span></span>
            <span>남은: <span id="count-remain">25</span></span>
        </div>
    </div>

    <div class="bingo-wrapper">
        <div id="bingo-grid"></div>
    </div>
    
    <div class="footer-utils">
        <button class="btn" onclick="copyRoomLink()">🔗 링크 복사</button>
        <button class="btn" onclick="location.href='index.html'">🏠 홈으로</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDoExj9y1DAIZZYLu5g2H3FcexpPkLyfW4", authDomain: "pubg-mission-site.firebaseapp.com", projectId: "pubg-mission-site", storageBucket: "pubg-mission-site.firebasestorage.app", messagingSenderId: "26055063441", appId: "1:26055063441:web:f942888d592eb210924c30" };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app);
    
    const roomId = new URLSearchParams(window.location.search).get('room') || "default_bingo";
    const roomRef = doc(db, "bingo_sheets", roomId);

    window.toggleModeUI = () => {
        const mode = document.getElementById('mode').value;
        document.getElementById('num-range').style.display = mode === 'num' ? 'flex' : 'none';
        document.getElementById('seq-btn').style.display = mode === 'num' ? 'inline-block' : 'none';
    };

    window.updateColors = () => {
        saveSync(true);
    };

    window.generateBingo = async (isNew, type) => {
        let rows = Math.min(10, Math.max(1, parseInt(document.getElementById('rows').value)));
        let cols = Math.min(10, Math.max(1, parseInt(document.getElementById('cols').value)));
        const mode = document.getElementById('mode').value;
        const count = rows * cols;
        const min = parseInt(document.getElementById('min').value);
        const max = parseInt(document.getElementById('max').value);

        let pool = [];
        if (mode === 'num') {
            if (type === 'seq') {
                for(let i=0; i<count; i++) {
                    let val = min + i; pool.push(val <= max ? val : "");
                }
            } else {
                if (max - min + 1 < count) { alert('숫자 범위가 칸 수보다 작습니다!'); return; }
                let nums = []; for(let i=min; i<=max; i++) nums.push(i);
                nums.sort(() => Math.random() - 0.5);
                pool = nums.slice(0, count);
            }
        } else if (mode === 'alpha') {
            let alphas = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
            if (type !== 'seq') alphas.sort(() => Math.random() - 0.5);
            for(let i=0; i<count; i++) pool.push(alphas[i % 26]);
        } else {
            for(let i=0; i<count; i++) pool.push("");
        }

        await setDoc(roomRef, {
            rows, cols, mode, min, max, pool,
            checked: isNew ? [] : (window.lastChecked || []),
            title: document.getElementById('mission-title').value,
            colors: [document.getElementById('color-before').value, document.getElementById('color-after').value],
            lastUpdate: Date.now()
        });
    };

    window.saveSync = async (onlyColor = false) => {
        const cells = document.querySelectorAll('.bingo-cell');
        const updateData = {
            title: document.getElementById('mission-title').value,
            colors: [document.getElementById('color-before').value, document.getElementById('color-after').value],
            rows: document.getElementById('rows').value,
            cols: document.getElementById('cols').value,
            mode: document.getElementById('mode').value,
            min: document.getElementById('min').value,
            max: document.getElementById('max').value,
            lastUpdate: Date.now()
        };
        if (!onlyColor) {
            updateData.pool = Array.from(cells).map(c => c.querySelector('input')?.value || c.innerText);
            updateData.checked = Array.from(cells).map((c, i) => c.classList.contains('checked') ? i : null).filter(v => v !== null);
        }
        await setDoc(roomRef, updateData, { merge: true });
    };

    onSnapshot(roomRef, (snap) => {
        const data = snap.data(); if(!data) return;
        window.lastChecked = data.checked || [];
        
        if (document.activeElement?.tagName !== 'INPUT') {
            document.getElementById('rows').value = data.rows || 5;
            document.getElementById('cols').value = data.cols || 5;
            document.getElementById('mode').value = data.mode || 'num';
            document.getElementById('mission-title').value = data.title || "";
            document.getElementById('min').value = data.min || 1;
            document.getElementById('max').value = data.max || 50;
        }

        document.documentElement.style.setProperty('--before-color', data.colors[0]);
        document.documentElement.style.setProperty('--after-color', data.colors[1]);
        document.getElementById('color-before').value = data.colors[0];
        document.getElementById('color-after').value = data.colors[1];

        const grid = document.getElementById('bingo-grid');
        const wrapper = document.querySelector('.bingo-wrapper');
        const currentId = `${data.rows}x${data.cols}_${data.mode}_${data.pool.join(',')}`;
        
        if (grid.dataset.stateId !== currentId) {
            grid.dataset.stateId = currentId;
            grid.innerHTML = "";
            grid.style.gridTemplateColumns = `repeat(${data.cols}, 1fr)`;
            grid.style.gridTemplateRows = `repeat(${data.rows}, 1fr)`;

            // 🔥 정중앙 배치를 위한 동적 사이즈 계산
            const wrapW = wrapper.clientWidth;
            const wrapH = wrapper.clientHeight;
            const cellSide = Math.min(wrapW / data.cols, wrapH / data.rows) - 12; // 간격 고려
            
            grid.style.width = `${(cellSide + 10) * data.cols}px`;
            grid.style.height = `${(cellSide + 10) * data.rows}px`;

            // 가독성 확보를 위한 폰트 스케일링
            const fontSize = Math.floor(cellSide * 0.45);

            data.pool.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'bingo-cell';
                cell.style.fontSize = `${fontSize}px`;
                
                if (data.mode === 'manual') {
                    const input = document.createElement('input');
                    input.value = val;
                    input.onchange = () => saveSync();
                    cell.appendChild(input);
                } else {
                    const span = document.createElement('span');
                    span.innerText = val;
                    cell.appendChild(span);
                }

                cell.onclick = (e) => {
                    if (e.target.tagName === 'INPUT') return;
                    cell.classList.toggle('checked');
                    saveSync();
                };
                grid.appendChild(cell);
            });
        }

        const cells = grid.querySelectorAll('.bingo-cell');
        cells.forEach((cell, i) => cell.classList.toggle('checked', data.checked.includes(i)));

        document.getElementById('count-checked').innerText = data.checked.length;
        document.getElementById('count-remain').innerText = (data.rows * data.cols) - data.checked.length;
        toggleModeUI();
    });

    window.copyRoomLink = () => { navigator.clipboard.writeText(window.location.href).then(() => alert("초대 링크 복사 완료!")); };
    window.resetAll = async () => { if(confirm("판을 초기화할까요?")) { await setDoc(roomRef, {}); location.reload(); } };
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    toggleModeUI();
    
    // 창 크기 조절 시 빙고판 크기 재계산
    window.onresize = () => {
        const grid = document.getElementById('bingo-grid');
        grid.dataset.stateId = ""; // 상태 강제 초기화하여 다시 그리게 유도
    };
</script>
</body>
</html>
