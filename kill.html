<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>벽킬내기 - 실시간 방송 시트</title>
    <style>
        :root { 
            --bg: #fdfdfd; --card: #ffffff; --text: #333; 
            --p1: #ffadad; --p2: #ffd6a5; --p3: #caffbf; --p4: #9bf6ff;
            --accent: #4d94ff;
            --border: #444;
        }
        /* 다크모드 색상 완벽 대응 */
        [data-theme='dark'] { 
            --bg: #1a1a1b; --card: #2d2d2e; --text: #eee; 
            --p1: #8c4444; --p2: #8c6a44; --p3: #448c5a; --p4: #447a8c;
            --border: #666;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 15px; font-size: 12px; transition: background 0.3s; }
        
        .main-layout { display: flex; gap: 20px; align-items: flex-start; }
        
        /* 좌측 고정 대시보드 */
        .fixed-dashboard { position: sticky; top: 15px; width: 280px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .viewer-card { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid var(--border); }
        
        .room-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
        .room-tag { background: var(--accent); color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; }

        .main-score { font-size: 34px; font-weight: 900; color: var(--accent); margin: 10px 0; }
        
        .player-stat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-radius: 8px; margin-bottom: 8px; font-weight: bold; border: 1px solid #bbb; color: #333; }
        [data-theme='dark'] .player-stat-row { color: #eee; border-color: #555; }
        .p-score-detail { font-size: 12px; opacity: 0.9; }

        .bar-bg { height: 28px; background: #eee; border-radius: 14px; overflow: hidden; display: flex; position: relative; margin: 12px 0; border: 1px solid #999; }
        .bar-segment { height: 100%; transition: width 0.5s ease; }
        .bar-label { position: absolute; width: 100%; text-align: center; line-height: 28px; font-weight: 900; color: #000; z-index: 10; font-size: 14px; }

        /* 우측 시트 영역 */
        .content-area { flex: 1; min-width: 0; }
        table { width: 100%; border-collapse: collapse; background: var(--card); table-layout: fixed; margin-bottom: 10px; border: 2px solid var(--border); }
        th, td { border: 1px solid var(--border); padding: 8px; text-align: center; }
        th { background: rgba(128,128,128,0.1); font-size: 11px; color: var(--text); font-weight: bold; }

        input[type="number"], input[type="text"] { width: 90%; border: 1px solid #aaa; border-radius: 3px; padding: 5px 0; text-align: center; background: transparent; color: inherit; }
        
        .bg-p1 { background-color: var(--p1) !important; } .bg-p2 { background-color: var(--p2) !important; }
        .bg-p3 { background-color: var(--p3) !important; } .bg-p4 { background-color: var(--p4) !important; }
        
        /* 맵별 고유 색상 */
        .map-cell { font-weight: bold; }
        .map-erangel { color: #2e7d32; } .map-miramar { color: #d84315; }
        .map-sanhok { color: #00695c; } .map-taego { color: #1565c0; }

        .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; margin-bottom: 5px; transition: 0.2s; }
        .btn-copy { background: #27ae60; color: white; }
        .btn-lobby { background: #444; color: white; }
        .btn-reset { background: #d32f2f; color: white; }
        .btn-add { background: var(--card); border: 2px dashed #999; color: var(--text); margin-top: 10px; font-size: 14px; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="fixed-dashboard">
        <div class="viewer-card">
            <div class="room-info">
                <span>MISSION PROGRESS</span>
                <span class="room-tag" id="roomDisplay">ROOM #----</span>
            </div>
            <div class="main-score"><span id="v-total">0</span> / <span id="v-target">100</span></div>
            
            <div class="bar-bg">
                <div id="bar-1" class="bar-segment bg-p1" style="width:0%"></div>
                <div id="bar-2" class="bar-segment bg-p2" style="width:0%"></div>
                <div id="bar-3" class="bar-segment bg-p3" style="width:0%"></div>
                <div id="bar-4" class="bar-segment bg-p4" style="width:0%"></div>
                <div class="bar-label" id="v-percent">0%</div>
            </div>

            <div id="player-summaries">
                <div class="player-stat-row bg-p1"> <span class="n-1">P1</span> <span id="s-1" class="p-score-detail">0 (0-0)</span> </div>
                <div class="player-stat-row bg-p2"> <span class="n-2">P2</span> <span id="s-2" class="p-score-detail">0 (0-0)</span> </div>
                <div class="player-stat-row bg-p3"> <span class="n-3">P3</span> <span id="s-3" class="p-score-detail">0 (0-0)</span> </div>
                <div class="player-stat-row bg-p4"> <span class="n-4">P4</span> <span id="s-4" class="p-score-detail">0 (0-0)</span> </div>
            </div>
            
            <div style="margin-top:15px; font-weight:bold; font-size:13px; display:flex; justify-content:space-between; border-top:1px solid #ddd; padding-top:10px;">
                <span>🍗 치킨: <span id="v-wins" style="color:#2e7d32;">0</span>회</span>
                <span style="color:#d32f2f;">남은: <span id="v-remain">100</span></span>
            </div>
        </div>
        
        <button class="btn btn-copy" onclick="copyRoomLink()">🔗 초대 링크 복사</button>
        <button class="btn btn-lobby" onclick="location.href='index.html'">🏠 로비로 돌아가기</button>
        <button class="btn btn-reset" onclick="resetSheet()">🧹 시트지 초기화</button>
    </div>

    <div class="content-area">
        <div class="setting-table">
            <table>
                <tr>
                    <th width="80">설정</th>
                    <th class="bg-p1">
                        <input type="text" id="name-1" value="P1" onchange="updateAll()">
                        <button onclick="document.getElementById('cp-1').click()" style="border:none; background:none; cursor:pointer;">🎨</button>
                        <input type="color" id="cp-1" style="display:none" onchange="changeColor(1, this.value)">
                    </th>
                    <th class="bg-p2">
                        <input type="text" id="name-2" value="P2" onchange="updateAll()">
                        <button onclick="document.getElementById('cp-2').click()" style="border:none; background:none; cursor:pointer;">🎨</button>
                        <input type="color" id="cp-2" style="display:none" onchange="changeColor(2, this.value)">
                    </th>
                    <th class="bg-p3">
                        <input type="text" id="name-3" value="P3" onchange="updateAll()">
                        <button onclick="document.getElementById('cp-3').click()" style="border:none; background:none; cursor:pointer;">🎨</button>
                        <input type="color" id="cp-3" style="display:none" onchange="changeColor(3, this.value)">
                    </th>
                    <th class="bg-p4">
                        <input type="text" id="name-4" value="P4" onchange="updateAll()">
                        <button onclick="document.getElementById('cp-4').click()" style="border:none; background:none; cursor:pointer;">🎨</button>
                        <input type="color" id="cp-4" style="display:none" onchange="changeColor(4, this.value)">
                    </th>
                    <th width="180">목표 점수 & 치킨 점수</th>
                </tr>
                <tr>
                    <td>데스</td>
                    <td><input type="number" id="die-1" style="width:40px;" value="3" onchange="updateAll()"></td>
                    <td><input type="number" id="die-2" style="width:40px;" value="2" onchange="updateAll()"></td>
                    <td><input type="number" id="die-3" style="width:40px;" value="1" onchange="updateAll()"></td>
                    <td><input type="number" id="die-4" style="width:40px;" value="0" onchange="updateAll()"></td>
                    <td style="text-align:left; padding-left:10px;">
                        목표: <input type="number" id="targetInput" style="width:60px;" value="100" onchange="updateAll()"><br>
                        배틀: <input type="number" id="winBig" style="width:45px;" value="8" onchange="updateAll()"> 
                        미니: <input type="number" id="winSmall" style="width:45px;" value="5" onchange="updateAll()">
                    </td>
                </tr>
            </table>
        </div>

        <table id="mainSheet">
            <thead>
                <tr>
                    <th width="40">R</th>
                    <th width="100">맵</th>
                    <th colspan="2" class="bg-p1 n-1">P1</th>
                    <th colspan="2" class="bg-p2 n-2">P2</th>
                    <th colspan="2" class="bg-p3 n-3">P3</th>
                    <th colspan="2" class="bg-p4 n-4">P4</th>
                    <th width="40">🍗</th>
                    <th width="60">합계</th>
                </tr>
            </thead>
            <tbody id="sheetBody"></tbody>
        </table>
        <button class="btn btn-add" onclick="addNewRow()">+ 다음 라운드 추가 (+ Add Round)</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDoExj9y1DAIZZYLu5g2H3FcexpPkLyfW4", authDomain: "pubg-mission-site.firebaseapp.com", projectId: "pubg-mission-site", storageBucket: "pubg-mission-site.firebasestorage.app", messagingSenderId: "26055063441", appId: "1:26055063441:web:f942888d592eb210924c30" };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app);
    
    // 1. 테마 및 방 번호 로드
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    const roomId = new URLSearchParams(window.location.search).get('room') || "default";
    document.getElementById('roomDisplay').innerText = "ROOM #" + roomId;
    const roomRef = doc(db, "kill_sheets", roomId);

    let rowCount = 0;
    const maps = [{name:"에란겔",class:"map-erangel"},{name:"미라마",class:"map-miramar"},{name:"태이고",class:"map-taego"},{name:"비켄디",class:"map-taego"},{name:"론도",class:"map-taego"},{name:"사녹",class:"map-sanhok"},{name:"파라모",class:"map-sanhok"},{name:"카라킨",class:"map-miramar"}];

    function createRow(r) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${r}</td>
            <td class="map-cell"><select id="map-${r}" onchange="updateMapStyle(${r}); updateAll();" style="width:100%; border:none; background:transparent; color:inherit; font-weight:bold;">
                <option value="">선택</option>${maps.map(m=>`<option value="${m.name}">${m.name}</option>`).join('')}
            </select></td>
            ${[1,2,3,4].map(p => `
                <td><input type="number" id="k-${r}-${p}" onchange="updateAll()"></td>
                <td><input type="checkbox" id="d-${r}-${p}" onchange="updateAll()"></td>
            `).join('')}
            <td><input type="checkbox" id="w-${r}" onchange="updateAll()"></td>
            <td id="total-${r}" style="font-weight:900;">0</td>
        `;
        document.getElementById('sheetBody').appendChild(tr); rowCount = r;
    }

    window.updateMapStyle = (r) => {
        const sel = document.getElementById(`map-${r}`);
        sel.parentElement.className = "map-cell " + (maps.find(m => m.name === sel.value)?.class || "");
    };

    for(let i=1; i<=30; i++) createRow(i);
    window.addNewRow = () => createRow(rowCount + 1);

    window.updateAll = async () => {
        const settings = {
            names: [1,2,3,4].map(i => document.getElementById('name-'+i).value),
            colors: [1,2,3,4].map(i => getComputedStyle(document.documentElement).getPropertyValue(`--p${i}`).trim()),
            dies: [1,2,3,4].map(i => Number(document.getElementById('die-'+i).value)),
            target: Number(document.getElementById('targetInput').value),
            winBig: Number(document.getElementById('winBig').value),
            winSmall: Number(document.getElementById('winSmall').value)
        };
        let grandTotal = 0, winCount = 0, pK = [0,0,0,0], pD = [0,0,0,0], pS = [0,0,0,0], rounds = {};
        for(let r=1; r<=rowCount; r++) {
            const map = document.getElementById(`map-${r}`).value; if(!map) continue;
            let rowS = 0; const pStats = [];
            for(let p=1; p<=4; p++) {
                const k = Number(document.getElementById(`k-${r}-${p}`).value || 0);
                const d = document.getElementById(`d-${r}-${p}`).checked;
                const score = k - (d ? settings.dies[p-1] : 0);
                rowS += score; pS[p-1] += score; pK[p-1] += k; if(d) pD[p-1]++;
                pStats.push({k, d});
            }
            if(document.getElementById(`w-${r}`).checked) { winCount++; rowS += ["사녹","파라모","카라킨"].includes(map) ? settings.winSmall : settings.winBig; }
            document.getElementById(`total-${r}`).innerText = rowS; grandTotal += rowS;
            rounds[`r${r}`] = { map, isWin: document.getElementById(`w-${r}`).checked, pStats, rowS };
        }
        await setDoc(roomRef, { settings, rounds, grandTotal, winCount, pK, pD, pS, rowCount }, { merge: true });
    };

    onSnapshot(roomRef, (snap) => {
        const data = snap.data(); if(!data) return;
        if(data.rowCount > rowCount) { for(let i=rowCount+1; i<=data.rowCount; i++) createRow(i); }
        if(data.settings) {
            data.settings.colors.forEach((c, i) => document.documentElement.style.setProperty(`--p${i+1}`, c));
            data.settings.names.forEach((n, i) => {
                const input = document.getElementById(`name-${i+1}`);
                if (document.activeElement !== input) input.value = n;
                document.querySelectorAll(`.n-${i+1}`).forEach(el => el.innerText = n);
            });
            document.getElementById('targetInput').value = data.settings.target;
            document.getElementById('winBig').value = data.settings.winBig;
            document.getElementById('winSmall').value = data.settings.winSmall;
        }
        if(data.rounds) {
            for(let r=1; r<=rowCount; r++) {
                const rd = data.rounds[`r${r}`]; if(!rd) continue;
                document.getElementById(`map-${r}`).value = rd.map; updateMapStyle(r);
                document.getElementById(`w-${r}`).checked = rd.isWin;
                rd.pStats.forEach((p, pi) => {
                    const kIn = document.getElementById(`k-${r}-${pi+1}`);
                    if (document.activeElement !== kIn) kIn.value = p.k || "";
                    document.getElementById(`d-${r}-${pi+1}`).checked = p.d;
                });
                document.getElementById(`total-${r}`).innerText = rd.rowS;
            }
        }
        document.getElementById('v-total').innerText = data.grandTotal || 0;
        document.getElementById('v-percent').innerText = Math.min(100, Math.round(((data.grandTotal || 0) / (data.settings?.target || 100)) * 100)) + "%";
        if(data.pS) data.pS.forEach((v, i) => {
            document.getElementById(`bar-${i+1}`).style.width = (data.grandTotal > 0 ? Math.max(0, (v / data.settings.target) * 100) : 0) + "%";
            document.getElementById(`s-${i+1}`).innerText = `${v} (${data.pK[i]}-${data.pD[i] * data.settings.dies[i]})`;
        });
    });

    window.changeColor = async (pIdx, color) => {
        document.documentElement.style.setProperty(`--p${pIdx}`, color); await updateAll();
    };
    window.copyRoomLink = () => {
        navigator.clipboard.writeText(window.location.href).then(() => alert("초대 링크 복사 완료!"));
    };
    window.resetSheet = async () => { if(confirm("초기화?")) { await setDoc(roomRef, {}); location.reload(); } };
</script>
</body>
</html>
