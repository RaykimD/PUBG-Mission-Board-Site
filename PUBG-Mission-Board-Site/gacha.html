<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>가챠배그 - 배그 미션</title>
    <style>
        :root { --bg: #f8f9fa; --text: #212529; }
        [data-theme='dark'] { --bg: #121212; --text: #e0e0e0; }

        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .room-tag { background: #f1c40f; color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; }

        /* 그리드 및 카드 애니메이션 */
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; perspective: 1000px; }
        .card-container { aspect-ratio: 1/1; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.6s; }
        .card-container.is-flipped { transform: rotateY(180deg); }

        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: bold; font-size: 14px; border: 1px solid rgba(0,0,0,0.1); }
        .card-front { background: #2c3e50; color: white; }
        .card-back { transform: rotateY(180deg); color: white; font-size: 1.5rem; }

        /* 등급별 스타일 */
        .rank-normal { background: #95a5a6 !important; }
        .rank-rare { background: #3498db !important; box-shadow: 0 0 15px #3498db; }
        .rank-epic { background: #9b59b6 !important; box-shadow: 0 0 20px #9b59b6; }
        .rank-legend { background: linear-gradient(45deg, #f1c40f, #e67e22) !important; box-shadow: 0 0 30px #f1c40f; animation: pulse 1s infinite; color: black !important; }

        @keyframes pulse { 0% { transform: scale(1) rotateY(180deg); } 50% { transform: scale(1.1) rotateY(180deg); } 100% { transform: scale(1) rotateY(180deg); } }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 20% { transform: translate(-3px, 0px); } 50% { transform: translate(3px, 2px); } 100% { transform: translate(0px, 0px); } }
        .jackpot { animation: shake 0.5s infinite; }

        .footer-btns { margin-top: 30px; display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <header>
            <a href="index.html" style="text-decoration:none; color:var(--text)">🏠 로비</a>
            <div class="room-tag" id="roomDisplay">ROOM #----</div>
        </header>

        <h1>🎁 가챠배그: 행운의 카드를 뒤집으세요!</h1>
        <p>전설(👑) 등급 확률: 2% | 에픽(🔮) 등급 확률: 8%</p>

        <div class="grid" id="grid"></div>

        <div class="footer-btns">
            <button class="btn" style="background:#eee;" onclick="copyLink()">링크 복사</button>
            <button class="btn" style="background:#ff4444; color:white;" onclick="resetGame()">서버 초기화</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDoExj9y1DAIZZYLu5g2H3FcexpPkLyfW4",
            authDomain: "pubg-mission-site.firebaseapp.com",
            projectId: "pubg-mission-site",
            storageBucket: "pubg-mission-site.firebasestorage.app",
            messagingSenderId: "26055063441",
            appId: "1:26055063441:web:f942888d592eb210924c30"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        if (!roomId) {
            roomId = Math.floor(1000 + Math.random() * 9000).toString();
            window.location.search = `?room=${roomId}`;
        }
        document.getElementById('roomDisplay').innerText = "ROOM #" + roomId;

        const roomRef = doc(db, "gacha_rooms", roomId);
        const gridEl = document.getElementById('grid');
        const cards = [];

        for (let i = 1; i <= 100; i++) {
            const container = document.createElement('div');
            container.className = 'card-container';
            container.innerHTML = `
                <div class="card-face card-front">${i}</div>
                <div class="card-face card-back">?</div>
            `;
            container.onclick = () => flipCard(i);
            gridEl.appendChild(container);
            cards[i] = container;
        }

        async function flipCard(num) {
            const rand = Math.floor(Math.random() * 100) + 1;
            let res = { rank: 'normal', icon: '⚪' };
            if (rand > 98) res = { rank: 'legend', icon: '👑' };
            else if (rand > 90) res = { rank: 'epic', icon: '🔮' };
            else if (rand > 70) res = { rank: 'rare', icon: '🔹' };

            await updateDoc(roomRef, { [`card_${num}`]: { flipped: true, ...res } });
        }

        onSnapshot(roomRef, (snapshot) => {
            const data = snapshot.data() || {};
            for (let i = 1; i <= 100; i++) {
                const c = data[`card_${i}`];
                if (c && c.flipped) {
                    cards[i].classList.add('is-flipped');
                    const back = cards[i].querySelector('.card-back');
                    back.className = `card-face card-back rank-${c.rank}`;
                    back.innerText = c.icon;
                    if (c.rank === 'legend') triggerJackpot();
                } else {
                    cards[i].classList.remove('is-flipped');
                }
            }
        });

        function triggerJackpot() {
            document.getElementById('mainContainer').classList.add('jackpot');
            setTimeout(() => document.getElementById('mainContainer').classList.remove('jackpot'), 1000);
        }

        window.resetGame = async () => { if(confirm("초기화할까요?")) await setDoc(roomRef, {}); };
        window.copyLink = () => { navigator.clipboard.writeText(window.location.href); alert("초대 링크 복사 완료!"); };
    </script>
</body>
</html>
